<!DOCTYPE html>
<html>
<head>
  <title>Hi carlos site</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    #scare {
      display: none;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
    #text {
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 40vh;
    }
  </style>
</head>
<body>

<div id="text">Loading...</div>

<img id="scare" src="noFilter.webp" alt="Scary image">

<audio id="scream">
  <source src="scream.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", () => {
  document.getElementById("text").style.display = "none";
  document.getElementById("scare").style.display = "block";
  document.getElementById("scream").play();
});
</script>
  
</body>
</html>
